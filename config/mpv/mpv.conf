# --- Renderer & API ---
profile=high-quality
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe

# --- Upscaling & Quality ---
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
cscale-antiring=0.6
dscale=mitchell
deband=yes

# --- Playback & Window ---
save-position-on-quit=yes
volume=100

video-sync=display-resample
interpolation=yes
tscale=oversample

[4K-Fallback]
profile-cond=(width >= 3840 or height >= 2160)
profile-restore=copy
scale=spline36
cscale=spline36
deband=no

