[audio]
enable_sounds = true
sound_volume = 0.99999997764825821

[backdrop]
enabled = true

[bar.default]
background_opacity = 0.59999998658895493
capsule = true
end = [ "tray", "notifications", "clipboard", "network", "bluetooth", "volume", "battery", "control-center" ]
margin_edge = 8
margin_ends = 200
padding = 6
radius = 80
start = [ "launcher", "workspaces", "media" ]

[control_center]
width = 900

    [control_center.calendar]
    show_events_card = false

[desktop_widgets]
schema_version = 1
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[idle]
behavior_order = [ "lock", "screen-off", "suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

    [idle.behavior.suspend]
    action = "lock_and_suspend"
    enabled = false
    lock_before_suspend = true
    timeout = 18000.0

[location]
custom_schedule = true
sunrise = "04:00"
sunset = "20:30"

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000001", "lockscreen-widget-0000000000000002" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 739.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 144.0
    box_width = 320.0
    cx = 768.0
    cy = 296.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        clock_style = "digital"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 160.0
    box_width = 352.0
    cx = 768.0
    cy = 560.0
    output = "eDP-1"
    rotation = 0.0
    type = "media_player"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        hide_when_no_media = true

[nightlight]
enabled = true
start_time = "20:30"
stop_time = "04:00"
temperature_night = 5000
use_weather_location = false

[notification]
background_opacity = 0.59999998658895493

[osd]
background_opacity = 0.59999998658895493
lock_keys = false
position = "top_right"

    [osd.kinds]
    media = false

[shell]
avatar_path = "/data/Photos and Videos/download.png"
clipboard_confirm_clear_history = false
font_family = "Onest"
polkit_agent = true
telemetry_enabled = false

    [shell.animation]
    speed = 0.90000000000000002

    [shell.panel]
    control_center_placement = "floating"
    session_placement = "floating"
    transparency_mode = "glass"
    wallpaper_placement = "floating"
    wallpaper_position = "center"

[theme]
builtin = "Catppuccin"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4" ]
    community_ids = [ "yazi" ]

[wallpaper]
directory = "/data/Photos and Videos/Wallpapers"
transition = [ "disc", "honeycomb" ]
transition_duration = 4000
transition_on_startup = true

    [wallpaper.default]
    path = "/data/Photos and Videos/Wallpapers/my-neighbor-totoro-sunflowers.png"

    [wallpaper.last]
    path = "/data/Photos and Videos/Wallpapers/my-neighbor-totoro-sunflowers.png"

    [wallpaper.monitors.LVDS-1]
    path = "/data/Photos and Videos/Wallpapers/117497448_p0.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/data/Photos and Videos/Wallpapers/my-neighbor-totoro-sunflowers.png"

[weather]
enabled = false

[widget.battery]
display_mode = "icon"
show_label = false

[widget.bluetooth]
show_label = false

[widget.launcher]
custom_image = "/data/Photos and Videos/arch logo.png"
custom_image_colorize = true
scale = 1.3500000000000001

[widget.media]
hide_when_no_media = true
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.volume]
show_label = false

[widget.workspaces]
display = "none"
