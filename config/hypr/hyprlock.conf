general {
    disable_loading_bar = true
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 7
}

label {
    monitor =

    text = $TIME
    color = rgba(255,255,255,1.0)

    font_size = 96
    font_family = Geist

    position = 0, 180

    halign = center
    valign = center
}

label {
    monitor =

    text = cmd[update:60000] date "+%A, %d %B"

    color = rgba(220,220,220,1.0)

    font_size = 24
    font_family = Geist

    position = 0, 80

    halign = center
    valign = center
}

input-field {
    monitor =

    size = 240, 48

    placeholder_text = Enter Password
    font_family = Geist

    outline_thickness = 1

    dots_size = 0.22
    dots_spacing = 0.25

    fade_on_empty = false

    outer_color = rgba(255,255,255,0.10)
    inner_color = rgba(20,20,20,0.25)

    font_color = rgba(255,255,255,1.0)

    check_color = rgba(80,160,255,1.0)
    fail_color = rgba(255,90,90,1.0)

    position = 0, -60

    halign = center
    valign = center
}

